<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Zusatzstoffe - Das Berufliche Bildungszentrum</title>
    <link rel="icon" type="image/png" href="/Bilder/logo-dark.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/Styling/styles.css">
</head>

<body class="bg-black text-white min-h-screen flex flex-col">

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- PAGE CONTENT -->
    <div class="flex justify-center pt-10 pb-20">
        <form id="additiveForm" class="GrayColorBackground p-8 rounded-xl shadow-lg w-full max-w-md mt-10">

            <h2 class="text-3xl font-bold text-center mb-6">Zusatzstoffe</h2>

            <!-- id -->
            <label for="additiveId" class="block mb-2 font-semibold">Zusatzstoff Id</label>
            <input type="text" id="additiveId" class="w-full border text-gray-800 rounded-lg p-3" placeholder="Allergy Id">
            <p id="idError" class="text-red-500 text-sm mb-4"></p>

            <!-- Name -->
            <label for="additiveName" class="block mb-2 font-semibold">Name</label>
            <input type="text" id="additiveName" class="w-full border text-gray-800 rounded-lg p-3" placeholder="Additive Name">
            <p id="nameError" class="text-red-500 text-sm mb-4"></p>

            <button type="submit" class="w-full mt-8 PinkColorBackground text-white py-3 rounded-lg hover:bg-pink-800">Speichern</button>
        </form>
    </div>

    <!-- FOOTER -->
    <div id="footer" class="mt-auto"></div>

    <!-- LAYOUT SCRIPT -->
    <script src="/JavaScript/navControl.js" defer></script>
    <script src="/Layout/layout.js"></script>
    <script src="/JavaScript/additives.js"></script>
</body>
</html>
