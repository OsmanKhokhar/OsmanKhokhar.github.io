<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Registrieren - Das Berufliche Bildungszentrum</title>

    <link rel="icon" type="image/png" href="/Bilder/logo-dark.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/Styling/styles.css">
</head>

<body class="bg-black text-white min-h-screen flex flex-col">

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- SIGNUP FORM -->
    <div class="flex justify-center pt-10 pb-20">
        <form id="signupForm" class="GrayColorBackground p-8 rounded-xl shadow-lg w-full max-w-md mt-10" novalidate>

            <h2 class="text-3xl font-bold text-center mb-6">Registrieren</h2>

            <!-- FIRST NAME -->
            <label for="first_name" class="block mb-2 font-semibold">Vorname</label>
            <input id="first_name" type="text" class="w-full border rounded-lg p-3 mb-1 text-gray-800">
            <p id="firstNameError" class="text-red-500 text-sm mb-4"></p>

            <!-- LAST NAME -->
            <label for="last_name" class="block mb-2 font-semibold">Nachname</label>
            <input id="last_name" type="text" class="w-full border rounded-lg p-3 mb-1 text-gray-800 ">
            <p id="lastNameError" class="text-red-500 text-sm mb-4"></p>

            <!-- USERNAME -->
            <label for="username" class="block mb-2 font-semibold">Benutzername</label>
            <input id="username" type="text" class="w-full border rounded-lg p-3 mb-1 text-gray-800">
            <p id="usernameError" class="text-red-500 text-sm mb-4"></p>

            <!-- PASSWORD -->
            <label for="password" class="block mb-2 font-semibold">Passwort</label>
            <input id="password" type="password" class="w-full border rounded-lg p-3 mb-1 text-gray-800">
            <p id="passwordError" class="text-red-500 text-sm mb-4"></p>

            <!-- CONFIRM PASSWORD -->
            <label for="confirmPassword" class="block mb-2 font-semibold">Passwort bestätigen</label>
            <input id="confirmPassword" type="password" class="w-full border rounded-lg p-3 mb-1 text-gray-800">
            <p id="confirmPasswordError" class="text-red-500 text-sm mb-4"></p>

            <button type="submit" class="w-full mt-8 PinkColorBackground text-white py-3 rounded-lg hover:bg-pink-800">Registrieren</button>

        </form>
    </div>

    <!-- FOOTER -->
    <div id="footer" class="mt-auto"></div>

    <!-- LAYOUT SCRIPT -->
    <script src="/JavaScript/navControl.js" defer></script>
    <script src="/Layout/layout.js"></script>
    <script src="/JavaScript/signUpValidation.js" type="module"></script>
</body>
</html>
