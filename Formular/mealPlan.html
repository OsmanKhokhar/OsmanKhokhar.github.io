<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Essensplan-Das Beruflische bildungszentrum</title>
    <link rel="icon" type="image/png" href="/Bilder/logo-dark.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/Styling/styles.css">
</head>

<body class="bg-black text-white min-h-screen flex flex-col">

    <!-- NAVBAR INCLUDE -->
    <div id="navbar"></div>

    <!-- MEALPLAN FORM -->
    <div class="flex justify-center pt-10 pb-20 ">
        <form id="mealPlanForm" class="GrayColorBackground p-8 rounded-xl shadow-lg w-full max-w-md mt-10">
            <h2 class="text-3xl font-bold text-center mb-6">Essensplan</h2>

            <label for="date" class="block mb-2 font-semibold">Datum</label>
            <input type="date" id="date" class="w-full rounded-lg p-3 text-gray-400" placeholder="31.12.2025">
            <p id="dateError" class="text-red-500 text-sm mb-4"></p>

            <label for="fleischhaltige" class="block mb-2 font-semibold">Fleischhaltiges Gericht</label>
            <select id="fleischhaltige" class="w-full border text-gray-800 rounded-lg p-3">
                <option value="" disabled selected class="text-gray-400">Bitte auswählen</option>
            </select>
            <p id="fleischhaltigeError" class="text-red-500 text-sm mb-4"></p>

            <!-- Meal -->
            <label for="vegetarisch" class="block mb-2 font-semibold">Vegetarisches Gericht</label>
            <select id="vegetarisch" class="w-full border text-gray-800 rounded-lg p-3">
                <option value="" disabled selected>Bitte auswählen</option>
            </select>
            <p id="vegetarischError" class="text-red-500 text-sm mb-4"></p>

            <label for="salat" class="block mb-2 font-semibold">Salatbar</label>
            <select id="salat" class="w-full border text-gray-800 rounded-lg p-3">
                <option value="" disabled selected class="text-gray-400">Bitte auswählen</option>
            </select>
            <p id="salatError" class="text-red-500 text-sm mb-4"></p>

            <label for="nachtisch" class="block mb-2 font-semibold">Nachtisch</label>
            <select id="nachtisch" class="w-full border text-gray-800 rounded-lg p-3">
                <option value="" disabled selected class="text-gray-400">Bitte auswählen</option>
            </select>
            <p id="nachtischError" class="text-red-500 text-sm mb-4"></p>

            <button class="w-full mt-8 PinkColorBackground text-white py-3 rounded-lg hover:bg-pink-800">
                Speichern
            </button>
        </form>
    </div>

    <!-- FOOTER -->
    <div id="footer" class="mt-auto"></div>
    <script src="/JavaScript/navControl.js" defer></script>
    <script src="/Layout/layout.js" defer></script>
    <script src="/JavaScript/mealPlan.js" defer></script>
</body>
</html>
