<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Neues Gericht - Das Berufliche Bildungszentrum</title>

    <link rel="icon" type="image/png" href="/Bilder/logo-dark.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/Styling/styles.css">
</head>

<body class="bg-black text-white min-h-screen flex flex-col">

    <!-- NAVBAR INCLUDE -->
    <div id="navbar"></div>

    <!--FORM -->
    <div class="flex justify-center pt-10 pb-20 ">
        <form id="mealForm" class="GrayColorBackground p-8 rounded-xl shadow-lg w-full max-w-md mt-10">

            <h2 class="text-3xl font-bold text-center mb-6">Neues Gericht</h2>

            <label for="type" class="block mb-2 font-semibold">Typ</label>
            <select id="type" class="w-full border text-gray-800 rounded-lg p-3">
                <option value="" disabled selected>Typ auswählen</option>
                <option value="FleischhaltigesGericht">Fleischhaltiges Gericht</option>
                <option value="VegetarischesGericht">Vegetarisches Gericht</option>
                <option value="Salatbar">Salatbar</option>
                <option value="Desert">Nachtisch</option>
            </select>
            <p id="typeError" class="text-red-500 text-sm mb-4"></p>

            <label for="mealName" class="block mb-2 font-semibold">Gericht</label>
            <input type="text" id="mealName" class="w-full border text-gray-800 rounded-lg p-3 mb-4" placeholder="Gericht Name">
            <p id="mealNameError" class="text-red-500 text-sm "></p>

            <label for="allergens" class="block mb-2 font-semibold">Allergene</label>
            <select id="allergens" class="w-full border text-gray-800 rounded-lg p-3">
                <option value="" disabled selected>Allergene auswählen</option>
            </select>
            <p id="allergensError" class="text-red-500 text-sm mb-4"></p>

            <label for="additive" class="block mb-2 font-semibold">Zusatzstoff</label>
            <select id="additive" class="w-full border text-gray-800 rounded-lg p-3">
                <option value="" disabled selected>Zusatzstoff auswählen</option>
            </select>
            <p id="additiveError" class="text-red-500 text-sm mb-4"></p>

            <label for="price" class="block mb-2 font-semibold">Preis</label>
            <input type="number" step="0.01" id="price" class="w-full border text-gray-800 rounded-lg p-3 mb-4" placeholder="0,00">
            <p id="priceError" class="text-red-500 text-sm"></p>

            <label for="description" class="block mb-2 font-semibold">Beschreibung</label>
            <textarea id="description" class="w-full border text-gray-800 rounded-lg p-3 mb-4" placeholder="Zusätzliche Information (optional)" maxlength="250" rows="4"></textarea>

            <button type="submit" class="w-full mt-6 PinkColorBackground text-white py-3 rounded-lg hover:bg-pink-800">
                Speichern
            </button>
        </form>

    </div>

    <!-- FOOTER -->
    <div id="footer" class="mt-auto"></div>
    <!-- LAYOUT SCRIPT -->
    <script src="/JavaScript/navControl.js" defer></script>
    <script src="/Layout/layout.js"></script>
    <script src="/JavaScript/newMeal.js" type="module"></script>
</body>
</html>
